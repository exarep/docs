site_name: Exarep
site_description: Documentation for the Exarep project
site_url: https://exarep.github.io

theme:
  name: material
  custom_dir: overrides
  font: false
  palette:
    - scheme: redhat
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: redhat-dark
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  logo: logo-placeholder
  favicon: assets/favicon.ico

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/external-links.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Infrastructure as Code: iac.md
